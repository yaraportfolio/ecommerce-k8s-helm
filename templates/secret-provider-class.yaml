{{- if .Values.awsSecretsManager.enabled }}
# ============================================
# SECRET PROVIDER CLASS (AWS Secrets Manager CSI Driver)
# ============================================
# Intègre AWS Secrets Manager avec Kubernetes via le Secrets Store CSI Driver
# Les secrets sont synchronisés automatiquement dans un Kubernetes Secret
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aws-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: devops-microservices
    app.kubernetes.io/managed-by: helm
spec:
  provider: aws
  parameters:
    region: {{ .Values.awsSecretsManager.region | quote }}
    objects: |
      - objectName: "{{ .Values.awsSecretsManager.secrets.dbCredentials.secretName }}"
        objectType: "secretsmanager"
        jmesPath:
          - path: DB_USER
            objectAlias: DB_USER
          - path: DB_PASSWORD
            objectAlias: DB_PASSWORD
      - objectName: "{{ .Values.awsSecretsManager.secrets.jwtSecret.secretName }}"
        objectType: "secretsmanager"
        jmesPath:
          - path: JWT_SECRET
            objectAlias: JWT_SECRET

  secretObjects:
    - secretName: microservices-secret
      type: Opaque
      data:
        - key: DB_USER
          objectName: DB_USER
        - key: DB_PASSWORD
          objectName: DB_PASSWORD
        - key: JWT_SECRET
          objectName: JWT_SECRET
{{- end }}
