# ============================================
# APPLICATION SECRETS
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: microservices-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: devops-microservices
    app.kubernetes.io/managed-by: helm
type: Opaque
stringData:
  # Database credentials
  DB_USER: "{{ .Values.database.user }}"
  DB_PASSWORD: "{{ .Values.database.password }}"
  
  # JWT Secret
  JWT_SECRET: "{{ .Values.jwt.secret }}"

---
# ============================================
# REGISTRY SECRETS
# ============================================
# ℹ️ GHCR (GitHub Container Registry) images are PUBLIC
# No authentication required (imagePullSecrets.enabled: false by default)
# This section is kept for future private registry support
{{- if .Values.image.imagePullSecrets.enabled }}

{{- if eq .Values.image.registryType "ghcr" }}
# GitHub Container Registry secret (if needed for private images)
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-registry
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: devops-microservices
    app.kubernetes.io/managed-by: helm
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ template "ghcrConfigJson" . }}
{{- end }}

{{- end }}

---
# ============================================
# HELPER TEMPLATES
# ============================================
{{- define "ghcrConfigJson" -}}
{{- $auth := printf "%s:%s" .Values.ghcrRegistry.username .Values.ghcrRegistry.password | b64enc }}
{{- $server := .Values.image.ghcr.registry }}
{{- $config := dict "auths" (dict $server (dict "username" .Values.ghcrRegistry.username "password" .Values.ghcrRegistry.password "auth" $auth)) }}
{{- $config | toJson | b64enc }}
{{- end }}