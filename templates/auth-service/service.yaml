{{- if .Values.services.authService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.authService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.services.authService.name }}
    {{- if .Values.monitoring.enabled }}
    monitoring: "true"
    {{- end }}
  {{- if eq .Values.ingress.className "alb" }}
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: /api/auth/health
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/success-codes: "200"
  {{- end }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.services.authService.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: {{ .Values.services.authService.name }}
{{- end }}
