{{- if .Values.services.orderService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.orderService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.services.orderService.name }}
    version: {{ .Values.services.orderService.image.tag | quote }}
spec:
  {{- if not .Values.services.orderService.autoscaling.enabled }}
  replicas: {{ .Values.services.orderService.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Values.services.orderService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.services.orderService.name }}
        version: {{ .Values.services.orderService.image.tag | quote }}
        {{- if .Values.monitoring.enabled }}
        monitoring: "true"
        {{- end }}
    spec:
      {{- if .Values.image.imagePullSecrets.enabled }}
      imagePullSecrets:
        {{- include "microservices.imagePullSecrets" . | nindent 8 }}
      {{- end }}
      {{- if .Values.awsSecretsManager.enabled }}
      serviceAccountName: ecommerce-sa
      {{- end }}
      containers:
      - name: {{ .Values.services.orderService.name }}
        image: {{ include "microservices.image" (dict "root" . "service" .Values.services.orderService) }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.services.orderService.port }}
          name: http
        env:
        - name: PORT
          value: {{ .Values.services.orderService.port | quote }}
        - name: NODE_ENV
          value: "production"
        envFrom:
        - configMapRef:
            name: microservices-config
        - secretRef:
            name: microservices-secret
        {{- if .Values.awsSecretsManager.enabled }}
        volumeMounts:
        - name: aws-secrets-store
          mountPath: "/mnt/secrets"
          readOnly: true
        {{- end }}
        livenessProbe:
          httpGet:
            path: /api/orders/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/orders/ready
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          {{- toYaml .Values.services.orderService.resources | nindent 10 }}
      {{- if .Values.awsSecretsManager.enabled }}
      volumes:
      - name: aws-secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "aws-secrets"
      {{- end }}
{{- end }}
