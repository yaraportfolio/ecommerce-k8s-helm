{{- if and .Values.services.reviewService.enabled .Values.services.reviewService.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.services.reviewService.name }}-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.services.reviewService.name }}
  minReplicas: {{ .Values.services.reviewService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.services.reviewService.autoscaling.maxReplicas }}
  metrics:
  {{- if .Values.services.reviewService.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.services.reviewService.autoscaling.targetCPUUtilizationPercentage }}
  {{- end }}
  {{- if .Values.services.reviewService.autoscaling.targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.services.reviewService.autoscaling.targetMemoryUtilizationPercentage }}
  {{- end }}
{{- end }}
