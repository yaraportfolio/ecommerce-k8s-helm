{{- if .Values.services.reviewService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.reviewService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.services.reviewService.name }}
    {{- if .Values.monitoring.enabled }}
    monitoring: "true"
    {{- end }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.services.reviewService.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: {{ .Values.services.reviewService.name }}
{{- end }}
