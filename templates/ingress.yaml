{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: devops-microservices
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.ingress.host }}
    secretName: {{ .Values.ingress.tls.secretName | default "api-tls-secret" }}
  {{- end }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      # Auth Service - Pas de rewrite, transmission directe
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.services.authService.name }}
            port:
              number: {{ .Values.services.authService.port }}
      
      # Product Service - Pas de rewrite, transmission directe
      - path: /api/products
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.services.productService.name }}
            port:
              number: {{ .Values.services.productService.port }}
      
      # Order Service - Pas de rewrite, transmission directe
      - path: /api/orders
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.services.orderService.name }}
            port:
              number: {{ .Values.services.orderService.port }}
      
      # Review Service - Pas de rewrite, transmission directe
      - path: /api/reviews
        pathType: Prefix
        backend:
          service:
            name: {{ .Values.services.reviewService.name }}
            port:
              number: {{ .Values.services.reviewService.port }}
{{- end }}
